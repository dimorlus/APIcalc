;
;Version counter
;vcntr [all]|[Counter1 [Counter2]] [-cConfig] [-s] [-d] [-q]
;for increment all or specific counters.
;Use -s option for skip files changes
; -s all - updates all counters but don't touch files.
; -d - debug mode
; -q - quiet mode
;

;Counters
[Ver]
MinValue=0
MaxValue=999
Increment=1
Current=162

;Files
;#define _ver_   2.037

[File_00]
File="ver.h"
Counter=Ver
Search_00="(#define _ver_ .+2\.)([0-9]+)"
Replace_00="\0%03dL"
Search_01="(#define VER_BUILD) ([0-9]+)"
Replace_01="\0 %d"
Search_02="(#define VER_STRING "2\.)"
Replace_02="\0%03d""

;Appname=fcalc (Scientific formula calculator) 2.137 files
;Search_00="(fcalc \(Scientific formula calculator\) 2\.)([0-9]+)( files)"

[File_01]
File="fcalc.iss"
Counter=Ver
Search_00="(.*formula calculator\) 2\.)([0-9]+)( files)"
Replace_00="\0%03d\2"
Search_01="VersionInfoVersion="
Replace_01="&2.%03d"

;fcalc (Scientific formula calculator) 2.037 files
