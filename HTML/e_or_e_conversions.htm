<p>The argument is converted to match the style</p>
<p>&nbsp;</p>
<p>[-] d.ddd...e[+/-]ddd</p>
<p>&nbsp;</p>
<p>where:</p>
<p>&nbsp;</p>
<p style="text-align: left; padding: 0px 0px 0px 17px; margin: 0px 0px 0px 0px;"><span style="font-size:12pt; font-family: 'Arial Unicode MS','Lucida Sans Unicode','Arial';color:#000000;display:inline-block;width:17px;margin-left:-17px">&#9642;</span>one digit precedes the decimal point.</p><p style="text-align: left; padding: 0px 0px 0px 17px; margin: 0px 0px 0px 0px;"><span style="font-size:12pt; font-family: 'Arial Unicode MS','Lucida Sans Unicode','Arial';color:#000000;display:inline-block;width:17px;margin-left:-17px">&#9642;</span>the number of digits after the decimal point is equal to the precision.</p><p style="text-align: left; padding: 0px 0px 0px 17px; margin: 0px 0px 0px 0px;"><span style="font-size:12pt; font-family: 'Arial Unicode MS','Lucida Sans Unicode','Arial';color:#000000;display:inline-block;width:17px;margin-left:-17px">&#9642;</span>the exponent always contains at least two digits.</p>
